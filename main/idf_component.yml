## AquaControl managed component dependencies
## See: https://components.espressif.com/

dependencies:
  idf:
    version: ">=5.3.0"

  # LVGL v9 graphics library
  lvgl/lvgl:
    version: ">=9.2.0,<10.0.0"
    public: true

  # Espressif's LVGL port — handles task, tick, lock, RGB display attach
  espressif/esp_lvgl_port:
    version: ">=2.3.0"

  # GT911 capacitive touch controller driver
  espressif/esp_lcd_touch_gt911:
    version: ">=1.1.0"
